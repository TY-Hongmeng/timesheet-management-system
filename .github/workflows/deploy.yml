name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Clear yarn cache
        run: yarn cache clean

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 300000

      - name: Debug environment
        run: |
          echo "Node version: $(node --version)"
          echo "Yarn version: $(yarn --version)"
          echo "Environment files check:"
          echo ".env.production exists: $(test -f .env.production && echo 'yes' || echo 'no')"
          if [ -f .env.production ]; then
            echo "VITE_SUPABASE_URL in .env.production: $(grep VITE_SUPABASE_URL .env.production | cut -d'=' -f2 | head -c 50)..."
            echo "VITE_SUPABASE_ANON_KEY in .env.production: $(grep VITE_SUPABASE_ANON_KEY .env.production | cut -d'=' -f2 | head -c 50)..."
          fi

      - name: Type check
        run: yarn check

      - name: Build project
        run: yarn build

      - name: Verify build output
        run: |
          echo "Build completed. Checking output..."
          ls -la dist/
          echo "dist/index.html exists: $(test -f dist/index.html && echo 'yes' || echo 'no')"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true